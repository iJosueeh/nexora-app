<section class="grid gap-5">
  <div class="rounded-2xl border border-[#df3432]/35 bg-[#18121a] p-4 md:p-5">
    <p class="text-[0.62rem] md:text-[0.65rem] font-semibold tracking-[0.14em] uppercase text-[#f08f84]">
      Validación de correo institucional
    </p>
    <h3 class="mt-2 text-xl md:text-2xl font-semibold text-[#f2f4f8]">
      Revisa tu bandeja de entrada
    </h3>
    <p class="mt-2 text-xs md:text-sm text-[#b1b7c3] leading-6">
      Enviamos un enlace de verificación a
      <span class="font-semibold text-[#f2f4f8]">{{ email() }}</span>.
      Abre tu correo y confirma la cuenta para continuar con el perfil.
    </p>
  </div>

  <div class="grid gap-3 md:grid-cols-2">
    <a
      href="https://mail.google.com/"
      target="_blank"
      rel="noopener noreferrer"
      class="flex items-center justify-center gap-2 rounded-xl border border-white/12 bg-[#0f1219] hover:bg-[#131820] text-[#d6dbe4] font-semibold text-xs md:text-sm py-3.5 transition-all duration-200"
    >
      Abrir Gmail
    </a>
    <a
      href="https://outlook.office.com/mail/"
      target="_blank"
      rel="noopener noreferrer"
      class="flex items-center justify-center gap-2 rounded-xl border border-white/12 bg-[#0f1219] hover:bg-[#131820] text-[#d6dbe4] font-semibold text-xs md:text-sm py-3.5 transition-all duration-200"
    >
      Abrir Outlook
    </a>
  </div>

  <div class="grid gap-3 md:grid-cols-3">
    <button
      type="button"
      (click)="editEmail.emit()"
      class="rounded-xl border border-white/15 text-[#b9c0cd] text-xs md:text-sm font-semibold uppercase tracking-[0.08em] py-3 transition-all duration-200 hover:border-white/30"
    >
      Editar correo
    </button>

    <button
      type="button"
      (click)="resendEmail.emit()"
      [disabled]="isResending()"
      class="rounded-xl border border-white/12 bg-[#0f1219] hover:bg-[#131820] disabled:opacity-50 disabled:cursor-not-allowed text-[#d6dbe4] font-semibold text-xs md:text-sm py-3 transition-all duration-200"
    >
      @if (isResending()) {
        Reenviando...
      } @else {
        Reenviar correo
      }
    </button>

    <button
      type="button"
      (click)="continueStep.emit()"
      class="rounded-xl bg-[#df3432] hover:bg-[#ee4542] text-white font-bold text-xs md:text-sm uppercase tracking-[0.12em] py-3 transition-colors duration-200"
    >
      Ya verifiqué
    </button>
  </div>
</section>
