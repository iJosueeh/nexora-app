<div class="min-h-screen flex items-center justify-center bg-[#08090f] px-4">
  <div class="w-full max-w-md rounded-2xl border border-white/10 bg-[#0f1219] p-6 text-center">
    <h1 class="text-xl font-semibold text-[#f2f4f8]">Conectando con Microsoft</h1>
    <p class="mt-2 text-sm text-[#9da4b1]">Estamos validando tu cuenta institucional de UTP.</p>

    @if (isLoading) {
      <div class="mt-5">
        <app-loading mode="spinner" [fullscreen]="false" [message]="loadingMessage"></app-loading>
      </div>
    }
  </div>
</div>
