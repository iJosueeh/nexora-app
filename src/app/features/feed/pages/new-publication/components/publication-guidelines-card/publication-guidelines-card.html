<section class="rounded-[22px] border border-[color-mix(in_srgb,var(--brand-red)_16%,var(--brand-border))] bg-[color-mix(in_srgb,var(--brand-red)_6%,var(--brand-surface))] p-4">
  <h3 class="text-sm font-semibold text-[#f0d5d5]">Guidelines</h3>

  <ul class="mt-4 space-y-3 text-[12px] leading-5 text-[#cfa8a8]">
    @for (guideline of guidelines(); track guideline) {
      <li class="flex gap-2">
        <span class="mt-1 h-1.5 w-1.5 shrink-0 rounded-full bg-[var(--brand-red)]"></span>
        <span>{{ guideline }}</span>
      </li>
    }
  </ul>
</section>
