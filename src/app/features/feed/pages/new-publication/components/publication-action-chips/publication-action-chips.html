<div class="flex flex-wrap items-center gap-2">
  @for (action of actions; track action.id) {
    <button
      type="button"
      class="inline-flex items-center gap-2 rounded-lg border px-3 py-2 text-[11px] font-medium transition-colors"
      [class.border-[var(--brand-red)]]="activeActions().includes(action.id)"
      [class.bg-[color-mix(in_srgb,var(--brand-red)_12%,transparent)]]="activeActions().includes(action.id)"
      [class.text-[var(--brand-red)]]="activeActions().includes(action.id)"
      [class.border-[var(--brand-border)]]="!activeActions().includes(action.id)"
      [class.bg-black/20]="!activeActions().includes(action.id)"
      [class.text-[var(--brand-text)]]="!activeActions().includes(action.id)"
      (click)="toggleAction(action.id)"
    >
      <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path [attr.d]="action.iconPath"></path>
      </svg>
      <span>{{ action.label }}</span>
    </button>
  }
</div>
