<label
  class="block cursor-pointer rounded-[26px] border border-dashed border-[#2c2c2c] bg-[#0c0c0c] p-6 text-center transition-colors hover:border-[var(--brand-red)]/60"
  [class.border-[var(--brand-red)]]="isDragging()"
  [class.bg-[color-mix(in_srgb,var(--brand-red)_7%,#0c0c0c)]]="isDragging()"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave($event)"
  (drop)="onDrop($event)"
  for="publication-media-upload"
>
  <input
    id="publication-media-upload"
    type="file"
    class="sr-only"
    multiple
    accept="image/*,application/pdf"
    (change)="onFileChange($event)"
  />

  <div class="mx-auto flex h-12 w-12 items-center justify-center rounded-2xl border border-[#3a2a2a] bg-[#141414] text-[var(--brand-red)]">
    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M12 16V4"></path>
      <path d="m7 9 5-5 5 5"></path>
      <path d="M20 16.5V19a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-2.5"></path>
    </svg>
  </div>

  <h3 class="mt-4 text-sm font-semibold uppercase tracking-[0.14em] text-[#e2c8c8]">
    Upload Media
  </h3>
  <p class="mt-2 text-[11px] leading-5 text-[var(--brand-muted)]">
    {{ fileSummary() }}
  </p>

  @if (!files().length) {
    <p class="mt-2 text-[10px] uppercase tracking-[0.12em] text-[#6d6d6d]">
      Images, presentations or research PDFs
    </p>
  }
</label>

@if (files().length) {
  <div class="mt-3 flex flex-wrap gap-2">
    @for (file of files(); track file.name) {
      <button
        type="button"
        class="inline-flex items-center gap-2 rounded-full border border-[var(--brand-border)] bg-black/30 px-3 py-2 text-[11px] text-[var(--brand-text)] transition-colors hover:border-[var(--brand-red)] hover:text-[var(--brand-red)]"
        (click)="removeFile($index)"
      >
        <span class="max-w-36 truncate">{{ file.name }}</span>
        <span class="text-[10px] uppercase tracking-[0.12em] text-[var(--brand-muted)]">x</span>
      </button>
    }
  </div>
}
