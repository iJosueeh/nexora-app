<li [routerLinkActive]="'active'" #routerLinkActive="routerLinkActive" class="group relative">
  <a
    [routerLink]="item.route"
    class="
      relative flex items-center gap-3 rounded-lg px-4 py-2.5
      text-[#878d99] transition-all duration-200
      hover:bg-[#1f2937] hover:text-[#d6dae3]
      active:bg-[#1f2937] active:text-[#f0f2f7]
    "
    [attr.aria-label]="item.label"
  >
    <span class="flex-shrink-0 text-lg">{{ item.icon }}</span>
    <span class="flex-1 text-sm font-medium">{{ item.label }}</span>

    @if (item.badge && item.badge > 0) {
      <span
        class="
          inline-flex min-w-5 flex-shrink-0 items-center justify-center rounded-full bg-[#df3432]
          px-1 text-xs font-bold text-white animate-pulse
        "
      >
        {{ item.badge > 99 ? '99+' : item.badge }}
      </span>
    }

    <div
      class="
        absolute bottom-0 left-0 top-0 w-1 origin-top scale-y-0 rounded-r-lg bg-[#df3432]
        transition-all duration-200
      "
      [class.scale-y-100]="routerLinkActive.isActive"
    ></div>
  </a>
</li>
