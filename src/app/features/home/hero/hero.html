<section
  class="relative min-h-[90vh] flex flex-col items-center justify-center text-center px-6 overflow-hidden"
  style="background: linear-gradient(to bottom, #1a0a0a 0%, #0d0d0d 60%);"
>

  <!-- Background image overlay -->
  <div
    class="absolute inset-0 bg-cover bg-center bg-no-repeat opacity-20"
    style="background-image: url('/assets/images/hero-bg.jpg');"
  ></div>

  <!-- Red bottom fade -->
  <div
    class="absolute bottom-0 left-0 right-0 h-40 pointer-events-none"
    style="background: linear-gradient(to top, #0d0d0d 0%, transparent 100%);"
  ></div>

  <!-- Content -->
  <div class="relative z-10 flex flex-col items-center gap-5 max-w-2xl">

    <!-- Title -->
    <h1
      class="text-6xl md:text-7xl font-black tracking-tight leading-none"
      style="font-family: 'Inter', sans-serif;"
    >
      <span class="text-white">Nex</span><span class="text-[#e74c3c]">ora</span>
    </h1>

    <!-- Subtitle -->
    <p class="text-gray-400 text-base md:text-lg leading-relaxed max-w-lg">
      Conecta, investiga y trasciende dentro de la comunidad UTP. Una
      experiencia editorial de alto nivel para el académico moderno.
    </p>

    <!-- CTAs -->
    <div class="flex flex-wrap items-center justify-center gap-3 mt-2">
      <a
        routerLink="/register"
        class="inline-flex items-center gap-2 bg-[#c0392b] hover:bg-[#e74c3c] text-white text-xs font-bold tracking-[0.12em] uppercase px-6 py-3.5 rounded-lg transition-colors duration-200"
      >
        Unirse al Nexo
      </a>
      <a
        routerLink="/explorar"
        class="inline-flex items-center gap-2 border border-white/20 hover:border-white/40 text-gray-300 hover:text-white text-xs font-bold tracking-[0.12em] uppercase px-6 py-3.5 rounded-lg transition-all duration-200"
      >
        Explorar Investigación
      </a>
    </div>

    <!-- Scroll indicator -->
    <button
      class="mt-6 flex flex-col items-center gap-1 text-gray-600 hover:text-gray-400 transition-colors duration-200"
      (click)="scrollDown()"
      aria-label="Desplazar hacia abajo"
    >
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 animate-bounce">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
      </svg>
    </button>

  </div>
</section>
