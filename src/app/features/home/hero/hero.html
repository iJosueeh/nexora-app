<section
  class="relative flex min-h-[92vh] flex-col justify-center overflow-hidden bg-[#070a12] px-4 pb-12 pt-24 text-center md:min-h-[95vh] md:px-8 md:pt-28 lg:px-12 lg:pt-32"
>

  <!-- Background image overlay -->
  <div
    class="absolute inset-0 bg-cover bg-center bg-no-repeat opacity-35"
    style="background-image: url('/assets/images/hero-bg.jpg');"
  ></div>

  <div
    class="absolute inset-0"
    style="background: linear-gradient(180deg, rgba(10, 36, 64, 0.72) 0%, rgba(6, 9, 15, 0.68) 42%, rgba(8, 10, 14, 0.96) 100%);"
  ></div>

  <!-- Red bottom fade -->
  <div
    class="pointer-events-none absolute bottom-0 left-0 right-0 h-40"
    style="background: linear-gradient(to top, #090b10 0%, transparent 100%);"
  ></div>

  <!-- Content -->
  <div class="relative z-10 mx-auto flex w-full max-w-5xl flex-col items-center gap-5 md:gap-6">

    <!-- Title -->
    <h1
      class="text-6xl font-black leading-none tracking-tight md:text-7xl lg:text-8xl"
      style="font-family: 'Inter', sans-serif;"
    >
      <span class="text-white">Nex</span><span class="text-[#e74c3c]">ora</span>
    </h1>

    <!-- Subtitle -->
    <p class="max-w-2xl text-balance px-1 text-base leading-relaxed text-[#c3c5cb] md:text-lg lg:text-[1.38rem] lg:leading-relaxed">
      Conecta, investiga y trasciende dentro de la comunidad UTP. Una
      experiencia editorial de alto nivel para el académico moderno.
    </p>

    <!-- CTAs -->
    <div class="mt-3 flex flex-wrap items-center justify-center gap-3 md:mt-4 md:gap-4">
      <a
        routerLink="/register"
        class="inline-flex min-w-[12.6rem] items-center justify-center rounded-xl bg-[#df3432] px-6 py-3.5 text-xs font-bold uppercase tracking-[0.14em] text-white transition-colors duration-200 hover:bg-[#ee4442] md:min-w-54"
      >
        Unirse al Nexo
      </a>
      <a
        routerLink="/explorar"
        class="inline-flex items-center gap-2 rounded-xl border border-white/15 px-6 py-3.5 text-xs font-semibold uppercase tracking-[0.14em] text-[#d4d7de] transition-all duration-200 hover:border-white/35 hover:text-white"
      >
        Explorar Investigación
      </a>
    </div>

    <!-- Scroll indicator -->
    <button
      class="mt-4 flex flex-col items-center gap-1 text-[#969ba8] transition-colors duration-200 hover:text-[#c9ced8] md:mt-6"
      (click)="scrollDown()"
      aria-label="Desplazar hacia abajo"
    >
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 animate-bounce">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
      </svg>
    </button>

  </div>
</section>
