<div class="px-6 py-10 lg:px-12">
  <!-- Header con Búsqueda -->
  <header class="mb-12 flex flex-col gap-6 md:flex-row md:items-center md:justify-between">
    <div class="space-y-1">
      <h1 class="text-4xl font-black tracking-tight text-white">Explorar <span class="text-[#df3432]">Investigación</span></h1>
      <p class="text-zinc-400">Descubre los hallazgos más recientes de la comunidad académica UTP.</p>
    </div>

    <div class="relative w-full max-w-md">
      <span class="absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="h-5 w-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
        </svg>
      </span>
      <input 
        type="text" 
        placeholder="Buscar por título, autor o facultad..." 
        class="w-full rounded-2xl border border-white/10 bg-white/5 py-4 pl-12 pr-4 text-white placeholder:text-zinc-500 focus:border-[#df3432]/50 focus:outline-none focus:ring-1 focus:ring-[#df3432]/50"
      />
    </div>
  </header>

  <!-- Categorías / Filtros -->
  <div class="mb-10 flex flex-wrap gap-3">
    @for (category of categories(); track category) {
      <button 
        (click)="selectCategory(category)"
        [class]="selectedCategory() === category ? 'bg-[#df3432] text-white border-[#df3432]' : 'bg-white/5 text-zinc-400 border-white/10 hover:border-white/30'"
        class="rounded-full border px-6 py-2 text-sm font-semibold transition-all"
      >
        {{ category }}
      </button>
    }
  </div>

  <!-- Grid de Resultados -->
  <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
    @for (paper of filteredPapers(); track paper.id) {
      <app-research-card [paper]="paper"></app-research-card>
    } @empty {
      <div class="col-span-full py-20 text-center">
        <p class="text-lg text-zinc-500">No se encontraron investigaciones en esta categoría.</p>
      </div>
    }
  </div>
</div>
