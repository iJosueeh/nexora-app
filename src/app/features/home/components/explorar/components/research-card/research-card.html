<div class="group h-full flex flex-col gap-4 rounded-2xl border border-white/8 bg-white/5 p-5 transition-all duration-300 hover:border-[#df3432]/30 hover:bg-white/10">
  <div class="flex items-center justify-between">
    <span class="rounded-full bg-[#df3432]/10 px-3 py-1 text-[0.65rem] font-bold uppercase tracking-wider text-[#df3432]">
      {{ paper().faculty }}
    </span>
    <span class="text-[0.7rem] text-zinc-500">{{ paper().date }}</span>
  </div>

  <div class="flex-1 space-y-2">
    <h3 class="line-clamp-2 text-lg font-bold leading-tight text-white transition-colors group-hover:text-[#df3432]">
      {{ paper().title }}
    </h3>
    <p class="line-clamp-3 text-xs leading-relaxed text-zinc-400">
      {{ paper().summary }}
    </p>
  </div>

  <div class="flex items-center justify-between border-t border-white/10 pt-4">
    <div class="flex items-center gap-2">
      <div class="h-6 w-6 rounded-full bg-zinc-800 border border-white/10 flex items-center justify-center text-[0.6rem] font-bold text-zinc-400">
        {{ paper().author[0] }}
      </div>
      <span class="text-xs font-medium text-zinc-300">{{ paper().author }}</span>
    </div>
    
    <div class="flex items-center gap-1.5 text-zinc-500">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="h-4 w-4">
        <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12.a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
      </svg>
      <span class="text-xs">{{ paper().views }}</span>
    </div>
  </div>
</div>
