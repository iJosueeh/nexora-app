<section class="bg-[#1a1c22] px-4 py-16 md:px-10 md:py-20 lg:px-14 lg:py-24">
  <!-- Header -->
  <div class="mx-auto mb-10 flex w-full max-w-6xl flex-col items-center gap-2 text-center md:mb-12 lg:mb-14">
    <h2 class="text-3xl font-medium text-[#f3f4f7] md:text-4xl lg:text-[2.45rem]" style="font-family: 'Inter', sans-serif">
      Testimonios
    </h2>
    <p class="text-sm text-[#a1a6b2] md:text-[0.95rem]">Escucha a los académicos que definen el futuro de la UTP.</p>
  </div>

  <!-- Cards grid -->
  <div class="mx-auto grid w-full max-w-6xl grid-cols-1 gap-4 md:grid-cols-2 md:gap-5 lg:grid-cols-3 lg:gap-6">
    @for (t of testimonials(); track t.id) {
      <div
        class="flex h-full flex-col gap-5 rounded-2xl border border-white/8 bg-[#212329] p-6 transition-colors duration-300 hover:border-white/16 md:p-7"
      >
        <!-- Quote -->
        <p class="flex-1 text-sm leading-relaxed text-[#d5d8de] md:text-[0.96rem]">"{{ t.quote }}"</p>

        <!-- Author -->
        <div class="flex items-center gap-3 border-t border-white/10 pt-4">
          <!-- Avatar -->
          <div
            class="flex h-9 w-9 shrink-0 items-center justify-center rounded-full text-xs font-bold"
            [style.background]="t.avatarBg"
            [style.color]="t.avatarColor"
          >
            {{ t.initials }}
          </div>
          <div class="flex flex-col">
            <span class="text-sm font-semibold leading-tight text-[#f2f4f6]">{{ t.name }}</span>
            <span class="text-xs leading-tight text-[#9da3af]">{{ t.role }}</span>
          </div>
        </div>
      </div>
    }
  </div>
</section>
