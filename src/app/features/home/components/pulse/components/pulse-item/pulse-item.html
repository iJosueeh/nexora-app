<div class="flex h-full flex-col gap-4 rounded-xl border border-white/8 bg-[#1f2128] p-5 transition-colors duration-300 hover:border-white/16 md:p-6">
  <div class="flex items-center gap-3">
    <div
      class="flex h-8 w-8 shrink-0 items-center justify-center rounded-md border border-white/12 text-[0.68rem] font-bold"
      [style.background]="item().avatarBg"
      [style.color]="item().avatarColor"
    >
      {{ item().initials }}
    </div>
    <div class="flex flex-col min-w-0">
      <span class="truncate text-sm font-semibold leading-tight text-[#f0f2f6]">{{ item().name }}</span>
      <span class="truncate text-[0.62rem] uppercase tracking-[0.14em] text-[#959ba9]">{{ item().role }}</span>
    </div>
  </div>

  <p class="flex-1 text-sm leading-relaxed text-[#d0d4de]">"{{ item().content }}"</p>

  <div class="flex items-center justify-between border-t border-white/10 pt-3">
    <a
      [routerLink]="item().actionLink"
      class="inline-flex items-center gap-1 text-[0.62rem] font-bold uppercase tracking-[0.16em] text-[#f09b92] transition-colors duration-200 hover:text-[#f8b2ac]"
    >
      {{ item().actionLabel }}
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-3 h-3">
        <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
      </svg>
    </a>
    <span class="text-xs text-[#878d99]">{{ item().time }}</span>
  </div>
</div>
