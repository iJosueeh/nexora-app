<section class="bg-[#111111] px-6 py-16 md:px-16">
  <!-- Header -->
  <div class="flex items-start justify-between mb-8">
    <div class="flex flex-col gap-1">
      <h2 class="text-white font-bold text-xl" style="font-family: 'Inter', sans-serif">
        University Pulse
      </h2>
      <p class="text-gray-500 text-xs leading-relaxed max-w-xs">
        Actividad reciente de la comunidad académica UTP.
      </p>
    </div>
    <a
      routerLink="/pulse"
      class="inline-flex items-center gap-1.5 text-xs font-bold tracking-widest uppercase text-[#e74c3c] hover:text-[#f1948a] transition-colors duration-200 shrink-0 mt-1"
    >
      Ver más info
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="2"
        stroke="currentColor"
        class="w-3.5 h-3.5"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"
        />
      </svg>
    </a>
  </div>

  <!-- Cards grid -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
    @for (item of pulseItems; track item.id) {
      <div
        class="bg-[#161616] border border-white/[0.07] rounded-2xl p-5 flex flex-col gap-4 hover:border-white/[0.14] transition-colors duration-300"
      >
        <!-- User info -->
        <div class="flex items-center gap-3">
          <div
            class="w-9 h-9 rounded-full flex items-center justify-center text-xs font-bold shrink-0"
            [style.background]="item.avatarBg"
            [style.color]="item.avatarColor"
          >
            {{ item.initials }}
          </div>
          <div class="flex flex-col min-w-0">
            <span class="text-white text-sm font-semibold leading-tight truncate">{{
              item.name
            }}</span>
            <span class="text-gray-500 text-xs leading-tight truncate">{{ item.role }}</span>
          </div>
        </div>

        <!-- Post content -->
        <p class="text-gray-400 text-sm leading-relaxed flex-1">"{{ item.content }}"</p>

        <!-- Footer -->
        <div class="flex items-center justify-between pt-3 border-t border-white/5">
          <!-- Action link -->
          <a
            [routerLink]="item.actionLink"
            class="inline-flex items-center gap-1 text-[0.65rem] font-bold tracking-widest uppercase text-[#e74c3c] hover:text-[#f1948a] transition-colors duration-200"
          >
            {{ item.actionLabel }}
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="2"
              stroke="currentColor"
              class="w-3 h-3"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"
              />
            </svg>
          </a>

          <!-- Time -->
          <span class="text-gray-600 text-xs">{{ item.time }}</span>
        </div>
      </div>
    }
  </div>
</section>
