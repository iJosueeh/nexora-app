<section class="bg-[#0f1117] px-4 py-16 md:px-10 md:py-20 lg:px-14 lg:py-24">
  <!-- Header -->
  <div class="mx-auto mb-8 flex w-full max-w-6xl items-start justify-between gap-4 md:mb-10">
    <div class="flex flex-col gap-1.5">
      <h2 class="text-2xl font-medium text-[#f1f3f7] md:text-[2rem]" style="font-family: 'Inter', sans-serif">
        University Pulse
      </h2>
      <p class="max-w-sm text-[0.62rem] uppercase tracking-[0.24em] text-[#8f95a3] md:text-[0.68rem]">
        Trending discourses & active scholars
      </p>
    </div>
    <a
      routerLink="/pulse"
      class="mt-1 inline-flex shrink-0 items-center gap-1.5 text-[0.64rem] font-bold uppercase tracking-[0.16em] text-[#f09b92] transition-colors duration-200 hover:text-[#f8b2ac]"
    >
      View Live Feed
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="2"
        stroke="currentColor"
        class="w-3.5 h-3.5"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"
        />
      </svg>
    </a>
  </div>

  <!-- Cards grid -->
  <div class="mx-auto grid w-full max-w-6xl grid-cols-1 gap-4 md:grid-cols-2 md:gap-5 lg:grid-cols-3 lg:gap-6">
    @for (item of pulseItems; track item.id) {
      <div
        class="flex h-full flex-col gap-4 rounded-xl border border-white/8 bg-[#1f2128] p-5 transition-colors duration-300 hover:border-white/16 md:p-6"
      >
        <!-- User info -->
        <div class="flex items-center gap-3">
          <div
            class="flex h-8 w-8 shrink-0 items-center justify-center rounded-md border border-white/12 text-[0.68rem] font-bold"
            [style.background]="item.avatarBg"
            [style.color]="item.avatarColor"
          >
            {{ item.initials }}
          </div>
          <div class="flex flex-col min-w-0">
            <span class="truncate text-sm font-semibold leading-tight text-[#f0f2f6]">{{
              item.name
            }}</span>
            <span class="truncate text-[0.62rem] uppercase tracking-[0.14em] text-[#959ba9]">{{ item.role }}</span>
          </div>
        </div>

        <!-- Post content -->
        <p class="flex-1 text-sm leading-relaxed text-[#d0d4de]">"{{ item.content }}"</p>

        <!-- Footer -->
        <div class="flex items-center justify-between border-t border-white/10 pt-3">
          <!-- Action link -->
          <a
            [routerLink]="item.actionLink"
            class="inline-flex items-center gap-1 text-[0.62rem] font-bold uppercase tracking-[0.16em] text-[#f09b92] transition-colors duration-200 hover:text-[#f8b2ac]"
          >
            {{ item.actionLabel }}
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="2"
              stroke="currentColor"
              class="w-3 h-3"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"
              />
            </svg>
          </a>

          <!-- Time -->
          <span class="text-xs text-[#878d99]">{{ item.time }}</span>
        </div>
      </div>
    }
  </div>
</section>
