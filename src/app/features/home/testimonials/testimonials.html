<section class="bg-[#0d0d0d] px-6 py-20 md:px-16">
  <!-- Header -->
  <div class="flex flex-col items-center text-center mb-12 gap-2">
    <h2 class="text-3xl md:text-4xl font-bold text-white" style="font-family: 'Inter', sans-serif">
      Testimonios
    </h2>
    <p class="text-gray-500 text-sm">Hear from the scholars shaping the future of UTP.</p>
  </div>

  <!-- Cards grid -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
    @for (t of testimonials; track t.id) {
      <div
        class="bg-[#141414] border border-white/[0.07] rounded-2xl p-7 flex flex-col gap-5 hover:border-white/[0.14] transition-colors duration-300"
      >
        <!-- Quote -->
        <p class="text-gray-300 text-sm leading-relaxed flex-1">"{{ t.quote }}"</p>

        <!-- Author -->
        <div class="flex items-center gap-3 pt-4 border-t border-white/6">
          <!-- Avatar -->
          <div
            class="w-9 h-9 rounded-full flex items-center justify-center text-xs font-bold shrink-0"
            [style.background]="t.avatarBg"
            [style.color]="t.avatarColor"
          >
            {{ t.initials }}
          </div>
          <div class="flex flex-col">
            <span class="text-white text-sm font-semibold leading-tight">{{ t.name }}</span>
            <span class="text-gray-500 text-xs leading-tight">{{ t.role }}</span>
          </div>
        </div>
      </div>
    }
  </div>
</section>
